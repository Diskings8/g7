syntax = "proto3";
package game;
option go_package = "./pb";

import "src/msg_common.proto";
import "src/msg_server.proto";

// 网关 ↔ 游戏服 双向流（唯一、长连接、专属某个玩家）
service GameStreamService {
  rpc Stream(stream GameMessage) returns (stream GameMessage) {}
}


// 服务节点之间的定义
service GameNodeService {
  // 登录服创建玩家
  rpc LoginNodeCreatePlayer(Req_Node_CreatePlayer) returns (Rsp_Node_CreatePlayer);
  rpc LoginNodeOrderPaid(Req_Node_OrderPaid) returns (Rsp_Node_OrderPaid);
  rpc NotifyNewBaseMail(Req_Node_NewBaseMail) returns (Rsp_Node_NewBaseMail);
}

service GatewayNodeService {
  // 登录服创建玩家
  rpc GetConnCount(Req_Node_ConnCount) returns (Rsp_Node_ConnCount);
}