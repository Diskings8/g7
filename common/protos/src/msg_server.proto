syntax = "proto3";

package game;
option go_package = "./pb";



message Req_Node_CreatePlayer{
  int64 userID =  1;
  int32 serverID = 2;
  string nickname = 4;
}

message Rsp_Node_CreatePlayer{
  int64 playerID = 1;
  int32 serverID = 2;
  int64 ID = 3;
  int64 userID = 4;
  string nickname = 5;
  string token = 6;
  int32 state = 7;
}

message Req_Node_ConnCount{
}

message Rsp_Node_ConnCount{
  int32 Count = 1;
}