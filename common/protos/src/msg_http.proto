syntax = "proto3";

package game;
option go_package = "./pb";


message Req_Http_CreatePlayer{
  int64 userID =  1;
  int32 serverID = 2;
  string nickname = 4;
}

message Rsp_Http_CreatePlayer{
  int64 playerID = 1;
  int32 serverID = 2;
  int64 ID = 3;
  int64 userID = 4;
  string nickname = 5;
  string token = 6;
}

message Req_Http_SelectPlayer{
  int64 uID = 1;
  int32 serverID = 2;
  int64 playerID = 3;
}

message Rsp_Http_SelectPlayer{
  int64 playerID = 1;
  int32 serverID = 2;
  int64 ID = 3;
  int64 userID = 4;
  string nickname = 5;
  string token = 6;
}