syntax = "proto3";

package game;
option go_package = "./pb";


// ==========================
// 🔥 所有协议号 全部在这里定义
// ==========================
enum MsgID {
  MSG_INVALID = 0; // 必须从0开始

  // 网关 ↔ 游戏服
  MSG_AUTH = 10001;          // 鉴权

  // 游戏业务 start from 20000
  MSG_Req_EnterGame = 20001;    // 进入游戏请求
  MSG_Rsp_EnterGame = 20002;    // 进入游戏返回

  //
  MSG_Req_BagData = 21001;
  MSG_Rsp_BagData = 21002;
  // 进入游戏
}