# 三服端口配置
server:
  platform: ":10080"   # 平台服端口
  login:    ":10081"   # 登录服端口
  game:     ":10082"   # 游戏服端口

# 公共数据库（账号、渠道、区服）
mysql_global:
  user: "root"
  pass: "123456"
  addr: "127.0.0.1"
  port: "3306"
  db_name_prefix: "global_db_91"
  params: "charset=utf8mb4&parseTime=True&loc=Local"
  dsn: "root:@tcp(127.0.0.1:3306)/global_db?charset=utf8mb4&parseTime=True&loc=Local"

# 游戏服数据库（角色、货币、背包，专服可独立分库）
mysql_game:
  user: "root"
  pass: "123456"
  addr: "127.0.0.1"
  port: "3306"
  db_name_prefix: "game_db_91"
  params: "charset=utf8mb4&parseTime=True&loc=Local"
  dsn: "root:@tcp(127.0.0.1:3306)/game_db?charset=utf8mb4&parseTime=True&loc=Local"

# 游戏服数据库
mongodb_game:
  uri: "mongodb://root:123456@127.0.0.1:27017"
  db_name_prefix: "game_db"
  pool_min: 5
  pool_max: 50

# Redis 公共缓存
redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

# 雪花算法配置（专服扩容用）
snowflake:
  datacenter_id: 1
  worker_id: 1

# JWT 密钥
jwt:
  secret: "g7-game-service_login-secret-key-2025"
  expire_hours: 72

etcd:
  dsn: "127.0.0.1:2379"

gateWay:
  addr: "127.0.0.1"
  port: "10001"
  rpc_port: "10002"

env:
  reset_hour: 5
  heat_beat_seconds: 30

mq:
  dsn: "127.0.0.1:9092"
  kind: "kafka"

json_path:
  path: "../common/conf_data"
