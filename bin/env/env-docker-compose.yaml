version: '3'

services:
  kafka:
    image: docker.1ms.run/apache/kafka:4.1.2
    container_name: kafka
    ports:
      - "9092:9092"      # 改成 ports
    expose:
      - "9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=KafkaDemoCluster123456789
    networks:
      - app-net
    restart: always

  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    restart: always
    networks:
      - app-net
    ports:
      - "2379:2379"      # 改成 ports
      - "2380:2380"      # 改成 ports
    expose:
      - "2379"
      - "2380"
    volumes:
      - ./etcd-data:/etcd-data
    command:
      - /usr/local/bin/etcd
      - --name=etcd-node-1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd-node-1=http://0.0.0.0:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=etcd-cluster-1

  mysql:
    image: docker.1ms.run/library/mysql:8.0-debian
    container_name: mysql
    restart: always
    networks:
      - app-net
    ports:
      - "3306:3306"      # 改成 ports
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - ./mysql_data/data:/var/lib/mysql
      - ./mysql_data/conf:/etc/mysql/conf.d
      - ./mysql_data/init:/docker-entrypoint-initdb.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time_zone=+8:00

  redis:
    image: docker.1ms.run/redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - app-net
    ports:
      - "6379:6379"      # 改成 ports
    expose:
      - "6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_AOF_ENABLED=yes
    volumes:
      - ./redis_data:/bitnami/redis/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

# 🔥 这里改成自动创建的内部网络，不需要 external
networks:
  app-net:
    driver: bridge